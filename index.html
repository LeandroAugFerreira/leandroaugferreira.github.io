<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfólio - Leandro Augusto Ferreira</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --dark-blue: #0a192f;
    --gradient-light: #1e3a5f;
    --light-blue: #00a8e8;
    --card-bg: #112240;
    --text-white: #e6f1ff;
    --text-gray: #8892b0;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--dark-blue);
    color: var(--text-white);
}

a {
    text-decoration: none;
    color: inherit;
}

/* HERO */
.hero-wrapper {
    background: radial-gradient(circle at 70% 50%, var(--gradient-light), var(--dark-blue));
}

.hero-wrapper .container {
    padding: 20px 20px;
}

.container {
    max-width: 1200px;
    width: 95%;
    margin: auto;
    padding: 20px 20px;
}

/* 🔥 AJUSTE PRINCIPAL */
header {
    display: flex;
    align-items: stretch; /* importante */
    justify-content: space-between;
    gap: 40px;
}

/* 🔥 AJUSTE PRINCIPAL */
.hero-text {
    display: flex;
    flex-direction: column;
    justify-content: flex-end; /* alinhamento na base */
    gap: 12px;
    max-width: 600px;
    height: 100%;
    padding-bottom: 10px; /* ajuste fino */
}

.hero-text h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    margin: 0;
}

.hero-text h2 {
    color: var(--light-blue);
    font-weight: 400;
}

.hero-text p {
    color: var(--text-gray);
    margin: 0;
}

/* BOTÃO */
.btn-linkedin {
    background: linear-gradient(135deg, #00a8e8, #0077b5);
    padding: 12px 22px;
    color: white;
    border-radius: 6px;
    font-weight: 600;
    width: fit-content;
    margin-top: 10px;
    transition: 0.3s;
}

.btn-linkedin:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,168,232,0.4);
}

.profile-pic {
    height: 480px;
    align-self: flex-end; /* garante alinhamento perfeito */
}

/* TITLES */
.section-title {
    border-bottom: 2px solid var(--light-blue);
    display: inline-block;
    margin-top: 80px;
    margin-bottom: 30px;
}

/* CASE */
.case-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    background: var(--card-bg);
    padding: 30px;
    border-radius: 12px;
    align-items: stretch;
}

.case-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.case-item {
    background: rgba(255,255,255,0.03);
    padding: 20px;
    border-radius: 8px;
}

.case-item strong {
    display: block;
    color: var(--light-blue);
    font-size: 0.75rem;
}

/* IFRAME */
.case-frame {
    height: 100%;
}

.case-frame iframe {
    width: 100%;
    height: 100%;
    min-height: 420px;
    border: none;
    border-radius: 10px;
    display: block;
}

/* PROJETOS */
.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
}

.project-card {
    background: linear-gradient(145deg, #112240, #0f1a33);
    padding: 20px;
    border-radius: 14px;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
}

.project-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.7);
}

.project-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 15px;
}

.project-card h4 {
    margin: 10px 0 5px;
    font-weight: 700;
}

.project-card p {
    color: var(--text-gray);
}

.project-card span {
    color: var(--light-blue);
    font-weight: 700;
    font-size: 0.8rem;
}

/* SKILLS */
.skills-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    background: var(--card-bg);
    padding: 20px;
    border-radius: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 80px 0;
}

.btn-contact {
    border: 2px solid var(--light-blue);
    padding: 12px 40px;
    color: var(--light-blue);
}

/* RESPONSIVO */
@media (max-width: 850px) {
    header { 
        flex-direction: column; 
        text-align: center; 
        align-items: center;
    }

    .hero-text {
        align-items: center;
        justify-content: center;
        text-align: center;
    }

    .profile-pic {
        height: 350px;
    }

    .case-container { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero-wrapper">
<div class="container">
<header>

<div class="hero-text">
<h1>Leandro Augusto Ferreira</h1>
<h2>Analista de Dados | Excel • SQL • Power BI • Python</h2>

<p>
Transformo dados em decisões estratégicas com foco em retenção, performance e crescimento de receita.
</p>

<p style="color: var(--light-blue); font-size: 0.9rem;">
Disponível para oportunidades em Análise de Dados
</p>

<a href="https://www.linkedin.com/in/leandro-datainsights/" class="btn-linkedin">
Fale comigo no LinkedIn
</a>
</div>

<img src="img/foto.png" class="profile-pic">

</header>
</div>
</div>
